name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: zsh {0}

jobs:
  fmt:
    name: rustfmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --check
        working-directory: core

  clippy:
    name: clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: core

  test:
    name: cargo test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo test --workspace
        working-directory: core

  deny:
    name: cargo-deny
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # cargo-deny is not installed on dev machines; CI is the enforcement
      # point for core/deny.toml (licenses, advisories, bans, sources).
      # `install-action` drops in the prebuilt binary (no Docker — so this runs
      # on macOS, unlike the container-based cargo-deny-action).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check
        working-directory: core

  bench-smoke:
    name: bench smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      # Criterion baselines are hardware-specific, so the >5% regression gate
      # cannot run meaningfully on a shared GitHub runner (its CPU differs from
      # any contributor's, producing bogus "regressions"). CI runs benches in
      # --smoke mode: reduced sampling, no baseline comparison — it only proves
      # the benches still compile and run. The real regression gate
      # (scripts/bench-gate.sh) runs locally or on a consistent self-hosted
      # runner. See the script header.
      - name: Bench smoke (no cross-machine comparison)
        run: ./scripts/bench-gate.sh --smoke

  app:
    name: tauri app build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      # Compile the Tauri shell (Rust backend + core crates, via path deps).
      # The frontend is static (no Node build step), so a plain cargo build is
      # the lightest way to verify the app compiles. Full bundling + signing +
      # notarization happens in release.yml, not on every CI run, to keep the
      # runner's CPU/time low.
      - name: Build Tabibu app (compile only)
        if: ${{ hashFiles('app/src-tauri/Cargo.toml') != '' }}
        run: cargo build --manifest-path app/src-tauri/Cargo.toml
      - name: No app yet
        if: ${{ hashFiles('app/src-tauri/Cargo.toml') == '' }}
        run: echo "app/src-tauri not present; app build skipped."
