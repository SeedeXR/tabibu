name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# Needed to publish a GitHub Release (attach the DMG to the tag).
permissions:
  contents: write

jobs:
  release:
    name: Build universal app + DMG (unsigned)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Same script developers run locally: stamps the version from VERSION,
      # adds the universal targets, installs the Tauri CLI, and bundles.
      #
      # No Apple Developer account → the bundle is UNSIGNED (installable via
      # right-click → Open). No signing/notarization env is set, so the bundler
      # never attempts (and never fails on) code signing. To sign later, add an
      # `env:` block here with the APPLE_* secrets and Tauri picks them up.
      - name: Build universal app + DMG (version from VERSION)
        run: ./scripts/build-app.sh

      # Also keep a workflow artifact (handy for non-tag debugging runs).
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabibu-dmg
          path: app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Publish the GitHub Release for the tag and attach the DMG so it's a real
      # download (artifacts expire and are buried in the run; a Release is not).
      - name: Publish Release with DMG
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Unsigned universal (Apple Silicon + Intel) build. On first launch,
            right-click the app → Open (Gatekeeper) since there's no Developer ID yet.
