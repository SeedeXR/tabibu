name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build universal app + DMG (unsigned)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Same script developers run locally: stamps the version from VERSION,
      # adds the universal targets, installs the Tauri CLI, and bundles.
      #
      # No Apple Developer account → the bundle is UNSIGNED (installable via
      # right-click → Open). No signing/notarization env is set, so the bundler
      # never attempts (and never fails on) code signing. To sign later, add an
      # `env:` block here with the APPLE_* secrets and Tauri picks them up.
      - name: Build universal app + DMG (version from VERSION)
        run: ./scripts/build-app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabibu-dmg
          path: app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
